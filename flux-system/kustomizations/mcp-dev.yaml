apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mcp-dev
  namespace: flux-system
spec:
  interval: 5m
  path: ./environments/dev
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: platform-config
  dependsOn:
    - name: mcp-base
