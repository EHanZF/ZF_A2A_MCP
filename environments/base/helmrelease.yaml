apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-server
spec:
  interval: 5m
  chart:
    spec:
      chart: mcp
      version: ">=0.1.0"
      sourceRef:
        kind: GitRepository   # or HelmRepository/OCIRepository if you publish charts elsewhere
        name: mcp-chart-repo
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/YOUR_ORG/YOUR_REPO/mcp-server
      # digest is patched per-env from CI (multi-arch manifest digest)
      digest: sha256:TO_BE_PATCHED
    service:
      port: 80
      targetPort: 7337
    ingress:
      enabled: true
      host: to-be-patched.example.com
    autoscaling:
      enabled: false
