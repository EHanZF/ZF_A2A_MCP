apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: orchestrator
  namespace: zf-mcp
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/orchestration-dmn-chart
      sourceRef:
        kind: GitRepository
        name: platform-config
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/EHanZF/ZF_A2A_MCP/dmn-gateway
      digest: sha256:TO_BE_PATCHED_BY_CI
      pullPolicy: IfNotPresent
    
    service:
      port: 8080
      targetPort: 8080
      type: ClusterIP
    
    ingress:
      enabled: true
      className: nginx
      host: dmn-gateway.example.com
      tls:
        enabled: true
        issuer: letsencrypt-prod
    
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 3
    
    # DMN configuration
    model:
      path: /config/orchestration_decision_model.json
    
    # Vector spaces config
    vectorSpaces:
      centroid: 0.92
  
  dependsOn:
    - name: mcp-base
      namespace: flux-system
