apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: mcp-server
  namespace: zf-mcp-dev
spec:
  provider: nginx
  progressDeadlineSeconds: 600
  
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mcp-server
  
  ingressRef:
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    name: mcp-server
  
  service:
    port: 80
    targetPort: 3000
  
  # Dev: faster feedback (30s intervals), more lenient thresholds
  analysis:
    interval: 30s
    threshold: 5
    maxWeight: 30
    stepWeight: 10
    metrics:
      - name: request-success-rate
        thresholdRange:
          min: 99
        interval: 30s
      - name: request-duration
        thresholdRange:
          max: 500
        interval: 30s
