apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit from base
bases:
  - ../base

# Dev namespace override
namespace: zf-mcp-dev

# Apply dev-specific value patches
patchesStrategicMerge:
  - patch-mcp-values.yaml
  - patch-orch-values.yaml

# Include dev Canary
resources:
  - canary-mcp.yaml

# Labels for dev environment
commonLabels:
  environment: dev
  app.kubernetes.io/version: dev

