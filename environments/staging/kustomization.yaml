apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit from base
bases:
  - ../base

# Staging namespace override
namespace: zf-mcp-staging

# Apply staging-specific value patches
patchesStrategicMerge:
  - patch-mcp-values.yaml
  - patch-orch-values.yaml

# Include staging Canary
resources:
  - canary-mcp.yaml

# Labels for staging environment
commonLabels:
  environment: staging
  app.kubernetes.io/version: staging

