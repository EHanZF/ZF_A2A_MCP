apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit from base
bases:
  - ../base

# Production namespace override
namespace: zf-mcp-prod

# Apply prod-specific value patches
patchesStrategicMerge:
  - patch-mcp-values.yaml
  - patch-orch-values.yaml

# Include prod Canary
resources:
  - canary-mcp.yaml

# Labels for production environment
commonLabels:
  environment: prod
  app.kubernetes.io/version: prod

