name: CI - MCP Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-mcp-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_and_test:
    name: Build and Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    env:
      # Opt into Node 24 runtime for JavaScript actions now
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CI: 'true'

    strategy:
      fail-fast: false
      matrix:
        node: ['22.x', '24.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: ${{ hashFiles('**/.eslintrc*') != '' }}
        run: npm run lint --if-present

      - name: Run tests
        # use "npm run test" so --if-present works reliably
        run: npm run test --if-present --silent

      - name: Build
        run: npm run build --if-present

      - name: Upload artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-node-${{ matrix.node }}
          if-no-files-found: ignore
          path: |
            npm-debug.log*
            logs/**
            coverage/**
            dist/**
            build/**
``
