name: CI - MCP Server

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-mcp-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_and_test:
    name: Build and Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CI: 'true'

    strategy:
      fail-fast: false
      matrix:
        node:
          - '22.x'
          - '24.x'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (if present)
        # Avoids hashFiles/complex expressions; will no-op if script not present
        run: npm run lint --if-present

      - name: Test
        run: npm run test --if-present --silent

      - name: Build
        run: npm run build --if-present

      - name: Upload artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-node-${{ matrix.node }}
          # Keep this a single line to avoid multi-line scalar indentation pitfalls
          path: "npm-debug.log*"
          if-no-files-found: warn
``
