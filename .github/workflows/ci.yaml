supply-chain:
    needs: telemetry
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install Syft + Grype
      - name: Install Syft
        uses: anchore/syft-action@v1
        with:
          version: latest

      - name: Install Grype
        uses: anchore/grype-action@v1
        with:
          version: latest

      # SBOM Generation
      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p sbom
          syft . -o cyclonedx-json > sbom/sbom.json

      # Vulnerability scanning
      - name: Scan dependencies with Grype
        id: grype
        run: |
          grype sbom/sbom.json \
            -o json > sbom/grype-report.json || true

      # Fail CI on CRITICAL findings
      - name: Fail on critical vulns
        run: |
          critical=$(jq '.matches[] | select(.vulnerability.severity=="Critical")' sbom/grype-report.json | wc -l)
          if [ "$critical" -gt 0 ]; then
            echo "Critical vulnerabilities detected."
            exit 1
          fi
          echo "No critical vulnerabilities."

      # Upload SBOM artifact
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

      # Upload SARIF to GitHub security dashboard
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sbom/grype-report.json
dmn-validation:
    needs: telemetry
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate DMN Schemas
        run: |
          for f in dmn/models/*.dmn; do
            echo "Validating $f"
            node dmn/validators/validate.js $f
          done

      - name: Run DMN Simulation Tests
        run: |
          for f in dmn/models/*.dmn; do
            echo "Simulating $f"
            node dmn/validators/simulate.js $f
          done
          dmn-docs:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Generate DMN Documentation
        run: node dmn/docgen/dmn-docgen.js

      - name: Upload DMN Docs
        uses: actions/upload-artifact@v4
        with:
          name: dmn-docs
          path: dmn/docs/
