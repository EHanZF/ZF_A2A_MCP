supply-chain:
    needs: telemetry
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install Syft + Grype
      - name: Install Syft
        uses: anchore/syft-action@v1
        with:
          version: latest

      - name: Install Grype
        uses: anchore/grype-action@v1
        with:
          version: latest

      # SBOM Generation
      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p sbom
          syft . -o cyclonedx-json > sbom/sbom.json

      # Vulnerability scanning
      - name: Scan dependencies with Grype
        id: grype
        run: |
          grype sbom/sbom.json \
            -o json > sbom/grype-report.json || true

      # Fail CI on CRITICAL findings
      - name: Fail on critical vulns
        run: |
          critical=$(jq '.matches[] | select(.vulnerability.severity=="Critical")' sbom/grype-report.json | wc -l)
          if [ "$critical" -gt 0 ]; then
            echo "Critical vulnerabilities detected."
            exit 1
          fi
          echo "No critical vulnerabilities."

      # Upload SBOM artifact
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

      # Upload SARIF to GitHub security dashboard
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sbom/grype-report.json
