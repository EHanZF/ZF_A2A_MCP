name: Continuous Integration

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop, main]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [x64]
        include:
          - os: ubuntu-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --coverage

      - name: Build
        run: npm run build

  telemetry:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Telemetry Schema
        run: npm run telemetry:schema

      - name: Validate IR Normalization
        run: npm run telemetry:ir

      - name: Telemetry Smoke Tests
        run: npm run telemetry:test

  release:
    needs: telemetry
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://prod.example.com

    steps:
      - name: Release Notification
        run: echo "Build passed. Awaiting manual approval."
