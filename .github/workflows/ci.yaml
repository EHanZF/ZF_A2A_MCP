name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Syft
      - name: Install Syft
        uses: anchore/syft-action@v0
        with:
          version: latest

      - name: Install Grype
        uses: anchore/grype-action@v0
        with:
          version: latest

      # SBOM Generation
      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p sbom
          syft . -o cyclonedx-json > sbom/sbom.json

      - name: Scan dependencies with Grype
        uses: anchore/scan-action@v3
        with:
          path: "sbom/sbom.json"
          fail-on-severity: critical
          output-format: "json"
          output-file: "sbom/grype-report.json"

      # Upload SBOM artifact
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

      # Upload SARIF to GitHub security dashboard
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sbom/grype-report.json

  dmn-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate DMN Schemas
        run: |
          for f in dmn/models/*.dmn; do
            echo "Validating $f"
            node dmn/validators/validate.js $f
          done

      - name: Run DMN Simulation Tests
        run: |
          for f in dmn/models/*.dmn; do
            echo "Simulating $f"
            node dmn/validators/simulate.js $f
          done

  dmn-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Generate DMN Documentation
        run: node dmn/docgen/dmn-docgen.js

      - name: Upload DMN Docs
        uses: actions/upload-artifact@v4
        with:
          name: dmn-docs
          path: dmn/docs/

  dmn-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run DMN Simulation Harness
        run: node dmn/sim/harness/run-sim.ts
