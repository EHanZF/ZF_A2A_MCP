name: build_and_test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate lockfile
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::Missing package-lock.json. Run 'npm install' locally and commit the file."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Lint
        run: npm run lint --if-present
