name: Deploy MCP Server

on:
  push:
    branches:
      - main
    paths:
      - "infra/mcp/**"
      - "infra/compose/**"
      - ".github/workflows/deploy-mcp.yml"

  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-mcp:
    runs-on: ubuntu-latest
    name: Build & Push MCP Server Image

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Version Metadata
        id: meta
        run: |
          echo "sha_short=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/heads/}-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "branch=$(echo ${GITHUB_REF#refs/heads/} | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Build and Push MCP image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/mcp
          file: ./infra/mcp/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/mcp-server:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/mcp-server:${{ steps.meta.outputs.branch }}
            ${{ env.REGISTRY }}/mcp-server:latest

      - name: Summary
        run: |
          echo "Built & pushed MCP server image:"
          echo "${{ env.REGISTRY }}/mcp-server:${{ steps.meta.outputs.branch }}"
          echo "${{ env.REGISTRY }}/mcp-server:${{ steps.meta.outputs.sha_short }}"
          echo "${{ env.REGISTRY }}/mcp-server:latest"

  deploy:
    needs: build-mcp
    runs-on: ubuntu-latest
    name: Deploy to Production VM

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create SSH key
        run: |
          echo "${{ secrets.VM_SSH_KEY }}" > id_rsa
          chmod 600 id_rsa

      - name: Upload compose stack to VM
        run: |
          scp -i id_rsa -o StrictHostKeyChecking=no -r infra/compose/* \
            ${{ secrets.VM_SSH_USER }}@${{ secrets.VM_SSH_HOST }}:/opt/agents/compose/

      - name: Upload env template
        run: |
          scp -i id_rsa -o StrictHostKeyChecking=no env/.env.template \
            ${{ secrets.VM_SSH_USER }}@${{ secrets.VM_SSH_HOST }}:/opt/agents/env/.env.template

      - name: Inject secrets into VM
        run: |
          ssh -i id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.VM_SSH_USER }}@${{ secrets.VM_SSH_HOST }} << 'EOF'
          mkdir -p /opt/agents/env
          cat > /opt/agents/env/.env.secrets <<SECRETS
POSTGRES_DSN=${{ secrets.POSTGRES_DSN }}
REDIS_URL=${{ secrets.REDIS_URL }}
MCP_API_KEY=${{ secrets.MCP_API_KEY }}
OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
MCP_ENCRYPTION_KEY=${{ secrets.MCP_ENCRYPTION_KEY }}
SECRETS
          chmod 600 /opt/agents/env/.env.secrets
EOF

      - name: Restart MCP Server Stack
        run: |
          ssh -i id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.VM_SSH_USER }}@${{ secrets.VM_SSH_HOST }} \
            "cd /opt/agents/compose && \
             docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} && \
             docker compose pull && \
             docker compose up -d"

      - name: Health Check
        run: |
          curl --fail --max-time 10 https://${{ secrets.MCP_DOMAIN }}/api/healthz \
            || (echo "Health check failed!" && exit 1)

      - name: Deployment Success
        run: echo "MCP Server deployed successfully."
