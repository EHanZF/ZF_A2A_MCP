name: Deploy to Kubernetes

on:
  push:
    branches: 
      - main
    paths:
      - 'environments/**'
      - 'helm/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      force-sync:
        description: 'Force Flux reconciliation'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Flux CLI
        run: |
          curl -s https://fluxcd.io/install.sh | sudo bash
          flux --version
      
      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Trigger Flux reconciliation (dev)
        if: github.event.inputs.environment == 'dev' || github.event_name == 'push'
        run: |
          kubectl rollout restart deployment -n flux-system flux-helm-controller
          kubectl rollout restart deployment -n flux-system flux-kustomize-controller
          flux reconcile kustomization mcp-dev --with-source || echo "Kustomization not yet available"
      
      - name: Trigger Flux reconciliation (staging)
        if: github.event.inputs.environment == 'staging'
        run: |
          flux reconcile kustomization mcp-staging --with-source
      
      - name: Trigger Flux reconciliation (prod)
        if: github.event.inputs.environment == 'prod'
        run: |
          flux reconcile kustomization mcp-prod --with-source
      
      - name: Force full reconciliation
        if: github.event.inputs.force-sync == 'true'
        run: |
          echo "Force-syncing all environments..."
          flux reconcile kustomization mcp-base --with-source
          flux reconcile kustomization mcp-dev --with-source
          flux reconcile kustomization mcp-staging --with-source
          flux reconcile kustomization mcp-prod --with-source
      
      - name: Verify Flux status
        run: |
          echo "Flux Kustomizations:"
          kubectl get kustomizations -n flux-system
          echo ""
          echo "Flux HelmReleases:"
          kubectl get helmreleases -A
          echo ""
          echo "Pod status (zf-mcp namespaces):"
          kubectl get pods -n zf-mcp-dev
          kubectl get pods -n zf-mcp-staging
          kubectl get pods -n zf-mcp-prod
