name: Fuzz & Test

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "refactor/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  fuzz_and_test:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Route to fuzzBranchDiffs agent
        id: fuzz
        run: |
          node -e "
            import('./Agents/swarm/routingFabric.js').then(async m => {
              const fabric = new m.RoutingFabric();
              const result = await fabric.route({
                source: 'GHA',
                task: 'branch.fuzz_and_test',
                payload: {
                  repoPath: '.',
                  branch: '${{ github.head_ref || github.ref_name }}'
                }
              });
              console.log('fuzz result:', JSON.stringify(result, null, 2));
              process.exit(result.success ? 0 : 1);
            }).catch(e => {
              console.error(e);
              process.exit(1);
            });
          "

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = ${{ steps.fuzz.outcome == 'success' }} ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${status} Fuzz test ${${{ steps.fuzz.outcome == 'success' }} ? 'passed' : 'failed'}`
            });

