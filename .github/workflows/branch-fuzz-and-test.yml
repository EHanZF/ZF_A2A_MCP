name: branch-fuzz-and-test

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "refactor/**"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to fuzz (default: current)"
        required: false
      auto_commit:
        description: "Auto-create PR if tests pass"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  orchestrate-fuzz:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      fuzz_status: ${{ steps.fuzz.outputs.status }}
      pr_url: ${{ steps.fuzz.outputs.pr_url }}
      test_coverage: ${{ steps.fuzz.outputs.coverage }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff comparison

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MCP CLI
        run: |
          npm install -g @modelcontextprotocol/cli
          npm install -g pnpm
          pnpm install

      - name: Invoke Fuzz Agent
        id: fuzz
        env:
          VECTOR_BUS_URL: ${{ secrets.VECTOR_BUS_URL }}
          MCP_URL: ${{ secrets.MCP_URL }}
        run: |
          # Invoke the agent via routing fabric
          node -e "
          (async () => {
            const { RoutingFabric } = await import('./Agents/swarm/routingFabric.js');
            const fabric = new RoutingFabric();
            const result = await fabric.route({
              source: 'GHA_fuzz',
              task: 'branch.fuzz_and_test',
              payload: {
                branch: '${{ inputs.branch || github.head_ref || github.ref_name }}',
                baseBranch: 'main',
                generateTests: true,
                autoCommit: ${{ inputs.auto_commit || 'true' }}
              }
            });
            
            console.log(JSON.stringify(result, null, 2));
            
            // Write outputs to GITHUB_OUTPUT
            const fs = require('fs');
            const output = result.response;
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 
              'status=' + (output.prStatus || 'pending') + '\n' +
              'pr_url=' + (output.prUrl || '') + '\n' +
              'coverage=' + (output.testResults?.coverage || 0) + '\n'
            );
          })();
          "

      - name: Validate diff (alternative flow)
        if: failure()
        run: |
          echo "⚠️ Routing fabric invocation failed, attempting direct import..."
          node -e "
          (async () => {
            const { fuzzBranchDiffs } = await import('./Agents/ci-agent/fuzzBranchDiffs.js');
            const result = await fuzzBranchDiffs({
              branch: '${{ inputs.branch || github.head_ref || github.ref_name }}',
              baseBranch: 'main',
              generateTests: true,
              autoCommit: ${{ inputs.auto_commit || 'true' }}
            });
            
            console.log(JSON.stringify(result, null, 2));
            
            // Set outputs
            console.log('::set-output name=status::' + (result.prStatus || 'pending'));
            console.log('::set-output name=pr_url::' + (result.prUrl || ''));
            console.log('::set-output name=coverage::' + (result.testResults?.coverage || 0));
          })();
          "

      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = parseFloat('${{ steps.fuzz.outputs.test_coverage }}') || 0;
            const status = '${{ steps.fuzz.outputs.fuzz_status }}';
            
            const comment = `## 🧪 Agentic Fuzz Test Report
            
            **Status:** ${status === 'created' ? '✅ PR Created' : status === 'pending' ? '⏳ Pending' : '❌ Failed'}
            
            **Test Coverage:** ${coverage.toFixed(2)}%
            
            ${status === 'created' ? `**PR URL:** ${{ steps.fuzz.outputs.pr_url }}` : ''}
            
            *Generated by branch.fuzz_and_test agent skill*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  verify-pr:
    needs: orchestrate-fuzz
    if: needs.orchestrate-fuzz.outputs.fuzz_status == 'created'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull PR validation checks
        run: |
          gh pr status --json url,title,state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

