name: PR Router

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [main, develop]

jobs:
  route:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        id: classify
        with:
          script: |
            const num = context.payload.pull_request.number;
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: num
              }
            );

            const labels = [];

            if (context.payload.pull_request.title.includes("DMN"))
              labels.push("dmn");

            if (files.some(f => f.filename.startsWith("services/")))
              labels.push("service-change");

            if (files.some(f => f.filename.startsWith("tools/")))
              labels.push("tooling");

            if (labels.length)
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: num,
                labels
              });
