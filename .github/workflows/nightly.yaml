name: Nightly DMN Regression

on:
  schedule:
    - cron: "0 2 * * *"  # 2 AM every night
  workflow_dispatch:

jobs:
  nightly-regression:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Run DMN Nightly Regression Suite
        run: node dmn/regression/nightly-regression.js

      - name: Upload Regression Snapshots
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression
          path: dmn/regression/history/
