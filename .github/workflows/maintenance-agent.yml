name: CI/CD Maintenance Agent

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  maintenance-agent:
    runs-on: ubuntu-latest
    name: Daily CI/CD Maintenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          pip install ruamel.yaml requests packaging

      - name: Run maintenance scan
        id: scan
        run: |
          python .github/scripts/ci_maintenance_agent.py > report.md
          echo "report_path=report.md" >> $GITHUB_OUTPUT

      - name: Create PR with fixes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "CI/CD Maintenance: Automated workflow update"
          branch: ci-maintenance/${{ github.run_id }}
          title: "CI/CD Maintenance Update"
          body: |
            Automated CI/CD maintenance report:
            $(cat report.md)
          labels: maintenance, automated
