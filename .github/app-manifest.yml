key_name: ZF A2A MCP Server

description: |
  GitHub App for MCP Server integration with RBAC, SSH CA support, and
  automated agent scaffolding. Enables CI/CD workflows to invoke MCP tools
  via OIDC JWT authentication.

url: https://github.com/EHanZF/ZF_A2A_MCP

hook_attributes:
  url: https://your-domain.com/github/webhook

public: false

default_permissions:
  actions: write
  contents: read
  id_token: write
  workflows: write
  pull_requests: write

default_events:
  - push
  - pull_request
  - workflow_dispatch

request_oauth_on_install: false

setup_url: https://your-domain.com/github/setup

setup_on_update: false

redirect_url: https://your-domain.com/github/callback

authorization_callback_url: https://your-domain.com/github/authorize

skip_request_on_install: false

# Optional: SSH Certificate Authority for org-level key signing
sign_as: "ZF A2A MCP Server"

# Webhooks that this app listens for (to trigger MCP workflows)
webhook_events:
  - push
  - pull_request
  - workflow_dispatch
  - workflow_run
  - check_run

# OIDC configuration for Actions
openid_configuration:
  issuer: "https://token.actions.githubusercontent.com"
  aud: "mcp-server"
  subject_token_type: "urn:ietf:params:oauth:token-type:jwt"

# SSH Certificate Authority settings (optional)
ssh_ca:
  public_key: |
    # Your org's SSH CA public key here
    # Paste the output of: ssh-keygen -y -f org-ssh-ca-key
  # key_id: "org-ca-key-001"

# Permissions scoped by resource type (advanced)
installations:
  target_type: "organization"
  # Allow installation only on specific orgs (optional)
  # whitelist: ["your-org"]

# Rate limits (optional)
rate_limits:
  requests_per_minute: 60
  burst_size: 100

# Deployment settings
deployment:
  environment: production
  regions: ["us-east-1", "eu-west-1"]
  timeout_seconds: 300
